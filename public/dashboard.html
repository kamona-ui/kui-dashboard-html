                width="24"

              class="flex-shrink-0 flex items-center gap-2 p-2 transition-colors rounded-md overflow-hidden text-white bg-purple-500 shadow-lg hover:bg-purple-600"

                aria-hidden="true"
                icon="ant-design:dashboard-outlined"
                class="flex-shrink-0"
                width="24"
              ></iconify-icon>

              <span
                class="text-base font-medium"
                x-show="isSidebarOpen || isSidebarHovered"
              >
                Dashboard
              </span>
            </a>
          </nav>

          <script>
            const perfectScroll = () => {
              let ps

              const update = () => {
                if (ps) {
                  ps.update()
                }
              }

              return {
                init() {
                  ps = new PerfectScrollbar(this.$el, {
                    wheelSpeed: 2,
                    wheelPropagation: false,
                    minScrollbarLength: 20,
                  })
                },
                update,
              }
            }
          </script>

                    icon="heroicons:moon"
                    width="24"
                  ></iconify-icon>

                </button>
              </div>
            </div>
