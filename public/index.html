<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>K UI Dashboard</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200;0,300;0,400;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/vendor/toasty.min.css" />

    <!-- Alpinejs -->
    <script src="assets/js/vendor/alpinejs.min.js" defer></script>

    <!-- Loading screen styles -->
    <style>
      #loading {
        position: fixed;
        perspective: 50vw;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        display: flex;
        z-index: 9000000000000;
        overflow: hidden;
      }
      #loading .left {
        background-color: black;
        width: 100%;
        height: 100%;
      }
      #loading .right {
        background-color: black;
        width: 100%;
        height: 100%;
      }
      #loading .logo {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #loading .logo svg {
        height: 50vh;
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <!--  Loading  -->
    <div id="loading">
      <div class="left"></div>
      <div class="right"></div>
      <div class="logo">
        <svg
          viewBox="0 0 40 40"
          fill="#A855F7"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M20 3L40 8L39.5207 9.91704L20 5.03685L0.479258 9.91704L0 8L20 3Z"
          />
          <path
            d="M20 37.1475L40 32.1475L39.5207 30.2304L20 35.1106L0.479258 30.2304L0 32.1475L20 37.1475Z"
          />

            d="M1.16589 11.7373L5.17972 10.8111V18.1675L11.9723 10.1935L11.3548 8.95852L15.6774 8.03225L13.8249 9.88479V11.1198L6.7235 19.4562L15.0599 30.8802L16.6037 32.1152L15.9862 32.424L12.8986 31.1889L5.17972 21.095V28.4101L7.34101 29.9539L1.16589 28.4101L3.32718 27.4839V13.2811L1.16589 11.7373Z"
          />
          <path
            d="M16.9124 7.7235L20 7.10598L22.47 7.7235L20.9263 9.26727C20.9263 9.26727 20.7204 27.4839 20.9263 28.1014C21.1321 28.7189 21.729 30.0774 22.47 30.5714C23.3963 31.1889 27.9489 31.2883 29.1729 28.8823C29.556 28.1293 29.5872 27.9014 29.7171 26.9514C29.7393 26.7894 29.7643 26.6064 29.7945 26.3962C29.8955 25.6912 29.8895 24.8909 29.8832 24.0704C29.8817 23.8711 29.8802 23.6706 29.8802 23.47V12.3548L28.0277 9.57603V9.26727L38.8341 11.4286V12.3548L37.2903 12.9723V26.8664L38.8341 28.1014L34.2028 29.3725L35.4378 27.4839V12.9723L33.2765 11.4286L31.424 12.9723L31.1152 25.0138C31.1152 25.8618 31.017 27.1791 30.7193 28.3251C30.6106 28.7435 30.1101 29.5467 30.1101 29.5467C30.1101 29.5467 29.6731 30.2533 29.2627 30.5714C28.8853 30.8639 28.1871 31.1541 28.1871 31.1541C28.1871 31.1541 26.0347 32.0258 24.0721 32.4043C23.08 32.5957 22.1571 32.4413 21.5645 32.2043C21.541 32.1912 21.5168 32.1778 21.492 32.1641C20.9896 31.8865 20.243 31.4739 19.6681 30.5714C19.1558 29.767 18.765 28.7318 18.765 27.4839V9.57603L16.9124 7.7235Z"
          />
        </svg>
      </div>
    </div>

    <div :class="{ dark: isDarkMode }" x-data="globalState">
      <div
        class="min-h-screen text-gray-900 bg-white dark:bg-dark-eval-0 dark:text-gray-100"
      >
        <!--  Navbar  -->
        <nav
          class="fixed inset-x-0 bottom-0 z-20 transition-all duration-500 md:top-0 md:bottom-auto"
          :class="{
                    'shadow-t-lg md:shadow-lg bg-white dark:bg-gray-700 translate-y-full md:-translate-y-full': scrollingDown,
                    'shadow-t-lg md:shadow-lg bg-white dark:bg-gray-700': scrollingUp,
                }"
        >
          <div
            class="relative flex items-center justify-between p-4 mx-auto max-w-7xl md:h-24"
          >
            <!--  Logo  -->
            <a
              href="/"
              class="inline-block p-2 bg-white rounded-md dark:bg-dark-eval-1"
            >
              <span class="sr-only">Home</span>
              <svg
                aria-hidden="true"
                class="w-10 h-auto md:w-12"
                viewBox="0 0 40 40"
                fill="#A855F7"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M20 3L40 8L39.5207 9.91704L20 5.03685L0.479258 9.91704L0 8L20 3Z"
                />
                <path
                  d="M20 37.1475L40 32.1475L39.5207 30.2304L20 35.1106L0.479258 30.2304L0 32.1475L20 37.1475Z"
                />
                <path
                  d="M1.16589 11.7373L5.17972 10.8111V18.1675L11.9723 10.1935L11.3548 8.95852L15.6774 8.03225L13.8249 9.88479V11.1198L6.7235 19.4562L15.0599 30.8802L16.6037 32.1152L15.9862 32.424L12.8986 31.1889L5.17972 21.095V28.4101L7.34101 29.9539L1.16589 28.4101L3.32718 27.4839V13.2811L1.16589 11.7373Z"
                />
                <path
                  d="M16.9124 7.7235L20 7.10598L22.47 7.7235L20.9263 9.26727C20.9263 9.26727 20.7204 27.4839 20.9263 28.1014C21.1321 28.7189 21.729 30.0774 22.47 30.5714C23.3963 31.1889 27.9489 31.2883 29.1729 28.8823C29.556 28.1293 29.5872 27.9014 29.7171 26.9514C29.7393 26.7894 29.7643 26.6064 29.7945 26.3962C29.8955 25.6912 29.8895 24.8909 29.8832 24.0704C29.8817 23.8711 29.8802 23.6706 29.8802 23.47V12.3548L28.0277 9.57603V9.26727L38.8341 11.4286V12.3548L37.2903 12.9723V26.8664L38.8341 28.1014L34.2028 29.3725L35.4378 27.4839V12.9723L33.2765 11.4286L31.424 12.9723L31.1152 25.0138C31.1152 25.8618 31.017 27.1791 30.7193 28.3251C30.6106 28.7435 30.1101 29.5467 30.1101 29.5467C30.1101 29.5467 29.6731 30.2533 29.2627 30.5714C28.8853 30.8639 28.1871 31.1541 28.1871 31.1541C28.1871 31.1541 26.0347 32.0258 24.0721 32.4043C23.08 32.5957 22.1571 32.4413 21.5645 32.2043C21.541 32.1912 21.5168 32.1778 21.492 32.1641C20.9896 31.8865 20.243 31.4739 19.6681 30.5714C19.1558 29.767 18.765 28.7318 18.765 27.4839V9.57603L16.9124 7.7235Z"
                />
              </svg>
            </a>

            <!--  Toggle dark mode button  -->
            <button
              type="submit"
              class="inline-flex items-center justify-center transition-colors font-medium select-none disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring focus:ring-offset-2 focus:ring-offset-white dark:focus:ring-offset-dark-eval-2 p-2 bg-white text-gray-500 hover:bg-gray-100 focus:ring-purple-500 dark:text-gray-400 dark:bg-dark-eval-1 dark:hover:bg-dark-eval-2 dark:hover:text-gray-200 rounded-md"
              @click="toggleDarkMode()"
            >
              <iconify-icon
                x-show="!isDarkMode"
                icon="heroicons:sun"
                width="24"
              ></iconify-icon>
              <iconify-icon
                x-show="isDarkMode"
                icon="heroicons:moon"
                width="24"
              ></iconify-icon>

              <span class="sr-only">Toggle dark mode</span>
            </button>
          </div>
        </nav>

        <main>
          <h1 class="sr-only">K UI Admin Dashboard Template</h1>

          <section
            class="relative min-h-screen overflow-hidden bg-gradient-to-tr from-purple-500 via-blue-300 to-indigo-400 dark:from-purple-900 dark:via-blue-900 dark:to-indigo-800"
          >
            <h2 class="sr-only">Showcase</h2>
            <!--  Background  -->
            <div
              class="absolute inset-x-[-10vw] top-0 bottom-20 md:bottom-0 md:top-24 rounded-[77vw/50vw] rounded-t-none md:rounded-b-none md:rounded-[77vw/50vw] bg-white dark:bg-dark-eval-0"
            ></div>

            <div class="px-6 pb-24 mx-auto md:pt-28 max-w-7xl">
              <div
                class="grid gap-5 perspective-100vw md:grid-cols-4 md:grid-rows-1"
              >
                <div
                  class="items-center justify-center hidden md:flex transform-style-3d"
                >
                  <div
                    id="mobile2Showcase"
                    class="flex items-center justify-center w-full h-full rotate-x-25 rotate-y-25 rotate-z--15"
                  >
                    <img
                      x-show="!isDarkMode"
                      src="assets/images/showcase/mobile-light-2.svg"
                      class="h-auto w-[70%] drop-shadow-2xl"
                    />
                    <img
                      x-show="isDarkMode"
                      src="assets/images/showcase/mobile-dark-2.svg"
                      class="h-auto w-[70%] drop-shadow-2xl"
                    />
                  </div>
                </div>

                <div
                  class="flex flex-col items-center justify-center col-span-3 row-start-2 gap-10 transform-style-3d md:pb-18 md:row-start-1 md:col-span-2 md:col-start-2"
                >
                  <div
                    class="flex items-center justify-center mt-10 md:mt-4 transform-style-3d"
                  >
                    <img
                      x-show="!isDarkMode"
                      id="desktopShowcase"
                      class="rotate-x-15 w-[75%] md:w-full"
                      src="assets/images/showcase/desktop-light.svg"
                      alt="Desktop showcase"
                    />
                    <img
                      x-show="isDarkMode"
                      id="desktopShowcase"
                      class="rotate-x-15 w-[75%] md:w-full"
                      src="assets/images/showcase/desktop-dark.svg"
                      alt="Desktop showcase"
                    />
                  </div>

                  <!-- CTA Buttons  -->
                  <div
                    class="flex flex-col items-center justify-center gap-6 lg:flex-row"
                  >
                    <!-- Live preview button -->
                    <a
                      href="dashboard.html"
                      class="inline-flex items-center justify-center transition-colors font-medium select-none disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring focus:ring-offset-2 focus:ring-offset-white dark:focus:ring-offset-dark-eval-2 px-4 py-2 text-base bg-purple-500 text-white hover:bg-purple-600 focus:ring-purple-500 gap-2 rounded-md"
                    >
                      <iconify-icon
                        aria-hidden="true"
                        icon="ant-design:eye-outlined"
                        width="24"
                      ></iconify-icon>

                      <span class="whitespace-nowrap">Live Preview</span>
                    </a>

                    <!-- Github link -->
                    <a
                      href="https://github.com/kamona-ui/kui-dashboard-html"
                      class="inline-flex items-center justify-center transition-colors font-medium select-none disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring focus:ring-offset-2 focus:ring-offset-white dark:focus:ring-offset-dark-eval-2 px-4 py-2 text-base bg-black text-gray-300 hover:text-white hover:bg-gray-800 focus:ring-black dark:hover:bg-dark-eval-3 gap-2 rounded-md"
                      target="_blank"
                    >
                      <iconify-icon
                        aria-hidden="true"
                        icon="ant-design:github-outlined"
                        width="24"
                      ></iconify-icon>

                      <span class="whitespace-nowrap">Github</span>
                    </a>
                  </div>
                </div>

                <div
                  class="items-center justify-center hidden md:flex transform-style-3d"
                >
                  <div
                    id="mobile1Showcase"
                    class="flex items-center justify-center w-full h-full rotate-x-25 rotate-y--25 rotate-z-15"
                  >
                    <img
                      x-show="!isDarkMode"
                      src="assets/images/showcase/mobile-light.svg"
                      class="h-auto w-[70%] drop-shadow-2xl"
                    />
                    <img
                      x-show="isDarkMode"
                      src="assets/images/showcase/mobile-dark.svg"
                      class="h-auto w-[70%] drop-shadow-2xl"
                    />
                  </div>
                </div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="assets/js/vendor/iconify-icon.min.js"></script>
    <script src="assets/js/vendor/toasty.min.js"></script>
    <script src="assets/js/vendor/gsap.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/landing-page.js"></script>
  </body>
</html>
